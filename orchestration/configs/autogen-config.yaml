# AutoGen Brain Configuration
# Used by agents when --brain autogen is specified.
# See: https://microsoft.github.io/autogen/

# LLM model to use for reasoning
model: gpt-4o

# Sampling temperature — lower = more deterministic
temperature: 0.2

# Maximum number of conversation rounds between agents
max_rounds: 10

# Whether tool bindings are available to the agent
tools_enabled: true

# Timeout for individual LLM calls (seconds)
timeout: 120

# Retry configuration for API calls
retry:
  max_retries: 3
  retry_delay: 2

# Logging level for the AutoGen framework
log_level: INFO
